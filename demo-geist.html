<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>短链接生成器 · Geist 字体版</title>
<style>
  /* ============ 设计 Token(优化后)============ */
  :root {
    /* 中性 */
    --bg: #FAFAF9;
    --surface: #FFFFFF;
    --surface-2: #F5F5F4;
    --text: #0A0A0A;
    --text-secondary: #525252;          /* 加深:7:1,过 AA */
    --text-tertiary: #737373;
    --border: #E5E5E5;
    --border-strong: #D4D4D4;
    --neutral-strong: #171717;          /* 原 --accent */
    --hover: #404040;

    /* 品牌(Claude 橙) */
    --brand: #E87A3E;
    --brand-hover: #D0682E;
    --brand-soft: rgba(232, 122, 62, 0.12);
    --brand-contrast: #FFFFFF;

    /* 语义 */
    --danger: #DC2626;
    --danger-hover: #B91C1C;
    --danger-bg: #FEF2F2;
    --success: #059669;
    --success-bg: #ECFDF5;
    --warning: #D97706;
    --warning-bg: #FFFBEB;

    /* 效果 */
    --shadow-sm: 0 2px 4px -1px rgba(0, 0, 0, 0.05);
    --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
    --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    --focus-ring: 0 0 0 3px var(--brand-soft);

    /* 阶梯系统(4px 基线) */
    --space-1: 4px;  --space-2: 8px;  --space-3: 12px; --space-4: 16px;
    --space-5: 20px; --space-6: 24px; --space-8: 32px; --space-10: 40px; --space-12: 48px;

    /* 圆角阶梯 */
    --radius-sm: 6px;   /* 控件 */
    --radius-md: 8px;   /* 容器 */
    --radius-lg: 12px;  /* 模态 */

    /* 字号阶梯(收敛为 5 阶) */
    --text-xs: 12px; --text-sm: 14px; --text-base: 16px; --text-lg: 20px; --text-xl: 32px;

    --font-sans: 'Geist', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    --font-mono: 'SF Mono', Menlo, Monaco, monospace;
  }

  /* ============ 暗色模式 ============ */
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0A0A0A;
      --surface: #171717;
      --surface-2: #1F1F1F;
      --text: #FAFAF9;
      --text-secondary: #A3A3A3;
      --text-tertiary: #737373;
      --border: #262626;
      --border-strong: #404040;
      --neutral-strong: #FAFAF9;
      --hover: #E5E5E5;
      --brand: #E87A3E;
      --brand-hover: #D0682E;
      --brand-soft: rgba(232, 122, 62, 0.22);
      --danger: #F87171; --danger-hover: #FCA5A5; --danger-bg: #450A0A;
      --success: #34D399; --success-bg: #022C22;
      --shadow-sm: 0 2px 4px -1px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
      --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
    }
  }

  * { box-sizing: border-box; }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    font-size: var(--text-base);
    line-height: 1.5;
    margin: 0;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    max-width: 980px;
    margin: 0 auto;
    padding: var(--space-12) var(--space-6);   /* 80→48 上下,首屏利用率提升 */
  }

  h1 {
    font-size: var(--text-xl);
    font-weight: 600;
    letter-spacing: -0.02em;
    margin: 0 0 var(--space-12);
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .section { margin-bottom: var(--space-12); }

  .section-title {
    font-size: var(--text-sm);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-secondary);
    margin: 0 0 var(--space-5);
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 240px max-content;
    gap: var(--space-3);
    margin-bottom: var(--space-4);
    align-items: start;
  }

  .form-field { display: flex; flex-direction: column; gap: var(--space-2); }

  label {
    font-size: var(--text-sm);
    font-weight: 500;
    color: var(--text-secondary);
  }

  input, textarea {
    width: 100%;
    padding: var(--space-2) var(--space-3);
    font-family: inherit;
    font-size: var(--text-base);            /* 15→16 */
    color: var(--text);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    transition: all 0.2s ease;
    box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.01);
  }
  input:focus, textarea:focus {
    outline: none;
    border-color: var(--brand);
    box-shadow: var(--focus-ring);
  }
  textarea {
    resize: vertical;
    min-height: 38px;
    font-family: var(--font-mono);
    font-size: var(--text-sm);
    line-height: 1.4;
  }

  /* ============ 按钮 ============ */
  button {
    height: 38px;
    padding: 0 var(--space-4);
    font-family: inherit;
    font-size: var(--text-sm);
    font-weight: 500;
    color: #fff;
    background: var(--neutral-strong);
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: var(--space-2);
  }
  button:not(.action-btn):hover:not(:disabled) {
    background: var(--hover);
    transform: translateY(-1px);
    box-shadow: var(--shadow-sm);
  }
  button:not(.action-btn):active:not(:disabled) {
    transform: translateY(0);
    box-shadow: none;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  /* 键盘焦点(可访问性) */
  button:focus-visible,
  input:focus-visible,
  textarea:focus-visible,
  a:focus-visible {
    outline: 2px solid var(--brand);
    outline-offset: 2px;
  }

  .btn-primary { background: var(--brand); }
  .btn-primary:not(.action-btn):hover:not(:disabled) {
    background: var(--brand-hover);
    box-shadow: 0 4px 12px var(--brand-soft);
  }
  .btn-ghost {
    color: var(--text);
    background: transparent;
    border: 1px solid var(--border);
  }
  .btn-ghost:not(.action-btn):hover:not(:disabled) {
    background: var(--surface);
    border-color: var(--brand);
    color: var(--brand);
    box-shadow: 0 4px 12px var(--brand-soft);
  }
  .btn-danger {
    color: var(--danger);
    background: transparent;
    border: 1px solid var(--danger);
  }
  .btn-danger:hover {
    background: var(--danger);
    color: #fff;
  }

  /* loading 态 */
  .btn-primary.is-loading {
    pointer-events: none;
    color: transparent;
    background: var(--brand-hover);
  }
  .btn-primary.is-loading::after {
    content: "";
    width: 16px; height: 16px;
    border: 2px solid rgba(255, 255, 255, 0.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    position: absolute;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .toolbar { display: flex; gap: var(--space-2); margin-top: var(--space-4); flex-wrap: wrap; }

  .status {
    padding: var(--space-3) var(--space-4);
    font-size: var(--text-sm);
    color: var(--text-secondary);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    margin-top: var(--space-4);
  }
  .status.success { color: var(--success); background: var(--success-bg); border-color: var(--success); }
  .status.error   { color: var(--danger);  background: var(--danger-bg);  border-color: var(--danger); }

  /* ============ 表格 ============ */
  .table-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    overflow: hidden;
    box-shadow: var(--shadow-md);
  }
  .table-header {
    padding: var(--space-5) var(--space-6) var(--space-4);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: var(--space-4);
  }
  .table-header h2 {
    font-size: var(--text-sm);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-secondary);
    margin: 0;
  }
  .table-controls { display: flex; align-items: center; gap: var(--space-3); }
  .count { font-size: var(--text-sm); color: var(--text-secondary); white-space: nowrap; }

  .search-box {
    width: 220px;
    padding: var(--space-2) var(--space-3);
    font-family: inherit;
    font-size: var(--text-sm);
    color: var(--text);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
  }
  .search-box:focus {
    outline: none;
    border-color: var(--brand);          /* 统一为品牌橙 */
    box-shadow: var(--focus-ring);
  }

  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  thead {
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    background: var(--surface-2);        /* 加背景,层级更清晰 */
  }
  th {
    padding: var(--space-3) var(--space-6);
    font-size: var(--text-xs);
    font-weight: 500;
    text-align: left;
    color: var(--text-secondary);
  }
  td {
    padding: var(--space-4) var(--space-6);
    font-size: var(--text-sm);
    border-top: 1px solid var(--border);
    vertical-align: middle;
  }
  tbody tr { transition: background-color 0.15s ease; }
  tbody tr:hover { background: var(--surface-2); }

  .cell-link {
    color: var(--brand);                 /* 链接用品牌色,与正文区分 */
    text-decoration: none;
    font-weight: 500;
    display: block;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .cell-link:hover { text-decoration: underline; }
  .cell-url {
    color: var(--text-secondary);
    font-family: var(--font-mono);
    font-size: var(--text-sm);           /* 13→14 */
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    line-height: 1.5;
  }

  .cell-actions {
    display: flex;
    gap: var(--space-4);
    justify-content: flex-end;
    opacity: 0;
    transform: translateX(8px);
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }
  tbody tr:hover .cell-actions { opacity: 1; transform: translateX(0); }

  .action-btn {
    background: transparent;
    border: none;
    padding: 0;
    height: auto;
    font-size: var(--text-sm);           /* 13→14 */
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    transition: color 0.15s ease;
  }
  .action-btn:hover { background: transparent; color: var(--text); transform: none; box-shadow: none; }
  .action-btn.danger:hover { color: var(--danger); }

  .checkbox-cell { width: 48px; padding: var(--space-4) var(--space-6); }
  .checkbox-wrapper { display: flex; align-items: center; justify-content: center; }
  input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--brand); }

  .pagination {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: var(--space-4) var(--space-6);
    border-top: 1px solid var(--border);
    background: var(--bg);
  }
  .pagination-info { font-size: var(--text-sm); color: var(--text-secondary); font-weight: 500; }
  .pagination-controls { display: flex; gap: var(--space-2); }
  .pagination-controls button { height: 32px; padding: 0 var(--space-3); font-size: var(--text-sm); }

  /* ============ 二维码模态 ============ */
  .qr-modal {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: var(--space-5);
  }
  .qr-modal.open { display: flex; }
  .qr-content {
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: var(--space-8);
    max-width: 400px;
    width: 100%;
    box-shadow: var(--shadow-lg);
    text-align: center;
  }
  .qr-content h3 { font-size: var(--text-lg); font-weight: 600; margin: 0 0 var(--space-2); color: var(--text); }
  .qr-key { font-size: var(--text-sm); color: var(--text-secondary); margin-bottom: var(--space-6); font-family: var(--font-mono); }
  .qr-canvas {
    margin: 0 auto var(--space-6);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: var(--space-4);
    background: var(--surface);
    width: 200px; height: 200px;
  }
  .qr-actions { display: flex; gap: var(--space-2); justify-content: center; }
  .qr-actions button { flex: 1; }

  /* ============ Toast ============ */
  .toast-container {
    position: fixed;
    bottom: var(--space-6);
    right: var(--space-6);
    z-index: 50;
    display: flex;
    flex-direction: column;
    gap: var(--space-3);
  }
  .toast {
    background: var(--surface);
    color: var(--text);
    padding: var(--space-4) var(--space-5);
    border-radius: var(--radius-md);
    box-shadow: var(--shadow-lg);
    border-left: 4px solid var(--brand);
    font-size: var(--text-sm);
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: var(--space-3);
  }
  .toast.error { border-left-color: var(--danger); }
  .toast.success { border-left-color: var(--success); }

  .demo-banner {
    background: var(--warning-bg);
    color: var(--warning);
    border-bottom: 1px solid var(--border);
    padding: var(--space-2) var(--space-6);
    font-size: var(--text-xs);
    text-align: center;
    font-weight: 500;
  }

  /* ============ 响应式 ============ */
  @media (max-width: 768px) {
    .page { padding: var(--space-10) var(--space-5); }
    .form-grid { grid-template-columns: 1fr; }
    .form-grid .form-field:last-child button { width: 100%; }
    .table-wrapper { border: none; border-radius: 0; box-shadow: none; }
    .table-header { padding: var(--space-4) 0; flex-direction: column; align-items: flex-start; }
    .table-controls { width: 100%; flex-direction: column; align-items: stretch; }
    .search-box { width: 100%; }
    table, thead, tbody, tr, th, td { display: block; }
    thead { display: none; }
    tr { margin-bottom: var(--space-4); border: 1px solid var(--border); border-radius: var(--radius-md); background: var(--surface); box-shadow: var(--shadow-sm); }
    td { padding: var(--space-3) var(--space-4); border: none; }
    td:first-child { padding-top: var(--space-4); }
    td:last-child { padding-bottom: var(--space-4); }
    .cell-actions { margin-top: var(--space-2); justify-content: flex-start; gap: var(--space-3); opacity: 1; transform: none; }
    .pagination { flex-direction: column; gap: var(--space-3); align-items: stretch; }
    .pagination-controls { width: 100%; }
    .pagination-controls button { flex: 1; }
    .toast-container { left: var(--space-5); right: var(--space-5); bottom: var(--space-5); }
  }
  @media (max-width: 480px) {
    h1 { font-size: var(--text-lg); }
  }
</style>
</head>
<body>
  <div class="demo-banner">Geist 字体版 · Latin/数字用 Geist · 中文回退系统字体(PingFang/雅黑等)</div>

  <div class="page">
    <header>
      <h1>短链接生成器</h1>
      <button class="btn-ghost" style="height:32px;padding:0 12px;font-size:14px;">中 / EN</button>
    </header>

    <section class="section">
      <h2 class="section-title">创建新链接</h2>
        <form id="shortenForm" onsubmit="return false;">
          <div class="form-grid">
            <div class="form-field">
              <label for="longURL">目标 URL</label>
              <textarea id="longURL" placeholder="https://example.com/long/path"></textarea>
            </div>
            <div class="form-field">
              <label for="keyPhrase">自定义短链</label>
              <input id="keyPhrase" type="text" maxlength="64" placeholder="my-link">
            </div>
            <div class="form-field">
              <label>&nbsp;</label>
              <button type="submit" class="btn-primary" onclick="demoLoading(this)">生成</button>
            </div>
          </div>
          <div class="toolbar">
            <button type="button" class="btn-ghost">同步 KV</button>
            <button type="button" class="btn-ghost">清理缓存</button>
            <button type="button" class="btn-ghost">导出 JSON</button>
            <button type="button" class="btn-ghost">导入 JSON</button>
          </div>
          <div class="status success">已就绪</div>
        </form>
    </section>

    <section class="section">
      <div class="table-wrapper">
        <div class="table-header">
          <h2>所有链接</h2>
          <div class="table-controls">
            <span class="count">共 3 条记录</span>
            <input type="text" class="search-box" placeholder="搜索短链...">
          </div>
        </div>
        <table>
          <thead>
            <tr>
              <th style="width:48px;"></th>
              <th style="width:30%;">短链</th>
              <th>目标地址</th>
              <th style="width:240px;"></th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td class="checkbox-cell"><div class="checkbox-wrapper"><input type="checkbox"></div></td>
              <td><a class="cell-link" href="#" onclick="return false;">bing</a></td>
              <td><div class="cell-url">https://www-bing-com-hg.tairitsu727.dpdns.org</div></td>
              <td><div class="cell-actions">
                <button class="action-btn">编辑</button>
                <button class="action-btn">复制</button>
                <button class="action-btn" onclick="openModal()">二维码</button>
                <button class="action-btn danger">删除</button>
              </div></td>
            </tr>
            <tr>
              <td class="checkbox-cell"><div class="checkbox-wrapper"><input type="checkbox"></div></td>
              <td><a class="cell-link" href="#" onclick="return false;">elysia1</a></td>
              <td><div class="cell-url">https://www.bilibili.com/video/BV1fY4y1F7GL/</div></td>
              <td><div class="cell-actions">
                <button class="action-btn">编辑</button>
                <button class="action-btn">复制</button>
                <button class="action-btn" onclick="openModal()">二维码</button>
                <button class="action-btn danger">删除</button>
              </div></td>
            </tr>
            <tr>
              <td class="checkbox-cell"><div class="checkbox-wrapper"><input type="checkbox"></div></td>
              <td><a class="cell-link" href="#" onclick="return false;">snippet</a></td>
              <td><div class="cell-url">https://r2.072727.xyz/tairitsu/vpn/snippetech.txt</div></td>
              <td><div class="cell-actions">
                <button class="action-btn">编辑</button>
                <button class="action-btn">复制</button>
                <button class="action-btn" onclick="openModal()">二维码</button>
                <button class="action-btn danger">删除</button>
              </div></td>
            </tr>
          </tbody>
        </table>
        <div class="pagination">
          <span class="pagination-info">第 1 / 1 页</span>
          <div class="pagination-controls">
            <button class="btn-ghost" disabled>上一页</button>
            <button class="btn-ghost" disabled>下一页</button>
          </div>
        </div>
      </div>
    </section>
  </div>

  <div class="toast-container">
    <div class="toast success">已复制:bing</div>
    <div class="toast error">复制失败</div>
  </div>

  <div id="qrModal" class="qr-modal">
    <div class="qr-content">
      <h3>二维码</h3>
      <div class="qr-key">bing</div>
      <div class="qr-canvas" style="display:flex;align-items:center;justify-content:center;color:var(--text-secondary);font-size:12px;">QR 占位</div>
      <div class="qr-actions">
        <button class="btn-primary">下载</button>
        <button class="btn-ghost" onclick="closeModal()">关闭</button>
      </div>
    </div>
  </div>

  <script>
    function demoLoading(btn) {
      btn.classList.add('is-loading');
      btn.style.position = 'relative';
      setTimeout(() => { btn.classList.remove('is-loading'); btn.style.position = ''; }, 1500);
    }
    function openModal() { document.getElementById('qrModal').classList.add('open'); }
    function closeModal() { document.getElementById('qrModal').classList.remove('open'); }
    document.getElementById('qrModal').addEventListener('click', e => { if (e.target.id === 'qrModal') closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
  </script>
</body>
</html>
